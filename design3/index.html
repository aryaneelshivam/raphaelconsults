<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduVoyage Global - Overseas Education Consultancy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f3fc',
                100: '#e1e7fa',
                200: '#c8d4f4',
                300: '#a1bbf0',
                400: '#759be9',
                500: '#14203D', /* Midnight Indigo base */
                600: '#101B34',
                700: '#0C152A',
                800: '#091021',
                900: '#060B17',
                950: '#03060C',
              },
              accent: {
                50: '#faf7f3',
                100: '#f4ede6',
                200: '#e9dccd',
                300: '#dbc4b0',
                400: '#cea88c',
                500: '#C5A073', /* Champagne Gold */
                600: '#b48653',
                700: '#956c3e',
                800: '#795b37',
              },
              gold: {
                200: '#F5DEB3',
                400: '#D4AF37',
                500: '#C5A073',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Outfit', 'Inter', 'system-ui', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
              'card': '0 20px 40px -10px rgba(20,32,61, 0.1)',
              'card-hover': '0 30px 60px -15px rgba(20,32,61, 0.2)',
              'glow': '0 0 50px -10px rgba(197,160,115, 0.25)',
              'glow-brand': '0 0 50px -10px rgba(20,32,61, 0.4)',
            },
            animation: {
              scroll: 'scroll 40s linear infinite',
              'bounce-slow': 'bounce 4s infinite',
              'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in-left': 'fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in-right': 'fadeInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'scale-in': 'scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 7s ease-in-out infinite',
              'float-delayed': 'float 7s ease-in-out 3.5s infinite',
              'shimmer': 'shimmer 2.5s linear infinite',
              'pulse-soft': 'pulseSoft 4s ease-in-out infinite',
              'gradient-x': 'gradientX 15s ease infinite',
            },
            keyframes: {
              scroll: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-100%)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInLeft: {
                '0%': { opacity: '0', transform: 'translateX(-40px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              fadeInRight: {
                '0%': { opacity: '0', transform: 'translateX(40px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-25px)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: '0.6' },
                '50%': { opacity: '1' },
              },
              gradientX: {
                '0%, 100%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
              }
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', system-ui, sans-serif; scroll-behavior: smooth; background-color: #FAFAFA; }
      h1, h2, h3, h4, h5, h6 { font-family: 'Outfit', 'Inter', system-ui, sans-serif; letter-spacing: -0.02em; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Ultra Premium Glass Effects */
      .glass { 
        background: rgba(255, 255, 255, 0.75); 
        backdrop-filter: blur(24px) saturate(180%); 
        -webkit-backdrop-filter: blur(24px) saturate(180%); 
        border: 1px solid rgba(255, 255, 255, 0.4); 
      }
      .glass-dark { 
        background: rgba(10, 16, 30, 0.85); 
        backdrop-filter: blur(24px) saturate(180%); 
        -webkit-backdrop-filter: blur(24px) saturate(180%); 
        border: 1px solid rgba(255, 255, 255, 0.05); 
      }
      .glass-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.6) 100%);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.6);
        box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
      }

      /* Stagger animation helper */
      .stagger-1 { animation-delay: 0ms; }
      .stagger-2 { animation-delay: 150ms; }
      .stagger-3 { animation-delay: 300ms; }
      .stagger-4 { animation-delay: 450ms; }
      .stagger-5 { animation-delay: 600ms; }

      /* Animated gradient backgrounds */
      .animated-gradient { background-size: 200% 200%; animation: gradientX 20s ease infinite; }

      /* Premium Nav Link hover effect */
      .nav-link { position: relative; }
      .nav-link::after { 
        content: ''; position: absolute; bottom: -6px; left: 50%; width: 0; height: 2px; 
        background: linear-gradient(90deg, #C5A073, #D4AF37); 
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        transform: translateX(-50%); border-radius: 2px; 
      }
      .nav-link:hover::after { width: 80%; }
      .nav-link:hover { color: #14203D; }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.36.0",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
